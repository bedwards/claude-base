name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          # Allow common prefixes: fix:, feat:, docs:, refactor:, test:, chore:
          if ! echo "$PR_TITLE" | grep -qE '^(fix|feat|docs|refactor|test|chore|build|ci|perf|style)(\(.+\))?: .+'; then
            echo "PR title should follow conventional commits format:"
            echo "  type(scope): description"
            echo "  e.g., 'feat(auth): add login page'"
            echo ""
            echo "Types: fix, feat, docs, refactor, test, chore, build, ci, perf, style"
            exit 1
          fi

      - name: Check for secrets in diff
        run: |
          SECRETS_PATTERNS='(ANTHROPIC_API_KEY|sk-[a-zA-Z0-9]+|DATABASE_URL=postgres|JWT_SECRET|BOT_TOKEN|PRIVATE_KEY)'
          if git diff origin/main...HEAD | grep -E "$SECRETS_PATTERNS"; then
            echo "❌ Possible secrets detected in PR diff!"
            exit 1
          fi

      - name: Check branch is up to date
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 10 ]; then
            echo "Branch is $BEHIND commits behind main. Please rebase."
            exit 1
          fi

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff origin/main...HEAD --stat | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(git diff origin/main...HEAD --stat | tail -1 | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "📊 PR size: +$ADDITIONS -$DELETIONS (total: $TOTAL lines)"

          # Very liberal limit for AI-assisted development teams
          # Claude Sonnet/Opus can handle large context - just needs to fit in ~30% of context window
          # At ~200k tokens, that's ~60k tokens of code, or roughly 15,000+ lines
          if [ "$TOTAL" -gt 10000 ]; then
            echo "ℹ️ Large PR ($TOTAL lines). This is fine for AI-assisted review."
            echo "Just ensure it fits within Claude's context window (~30% of 200k tokens)."
          fi

          # Always pass - this is informational only
          exit 0
